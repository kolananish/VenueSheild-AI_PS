name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "**"

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---- Checks ----

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Prettier
        run: pnpm prettier --check .
